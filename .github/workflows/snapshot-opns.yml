name: 360T7 opns
on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/snapshot-opns.yml'
      - 'files/**'
env:
  # 正式版填版本号如 "25.12.2"，SNAPSHOT 填 "SNAPSHOT"
  OPENWRT_VERSION: "SNAPSHOT"
  TARGET: "mediatek/filogic"
  PROFILE: "qihoo_360t7"
  ARCH: "aarch64_cortex-a53"
  MIHOMO_VERSION: "1.19.23"
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.2.2

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses-dev zlib1g-dev gawk \
            gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils u-boot-tools squashfs-tools device-tree-compiler \
            fakeroot

      # ★ 核心：统一计算所有与版本相关的路径变量
      - name: 🔧 Resolve build metadata
        id: meta
        run: |
          VER="${OPENWRT_VERSION}"

          if [ "${VER}" = "SNAPSHOT" ]; then
            DOWNLOAD_BASE="https://downloads.openwrt.org/snapshots/targets/${TARGET}"
            BUILDER_NAME="openwrt-imagebuilder-mediatek-filogic.Linux-x86_64"
            ORIG_FIRMWARE="openwrt-SNAPSHOT-mediatek-filogic-qihoo_360t7-squashfs-sysupgrade.itb"
            NIKKI_BRANCH="SNAPSHOT"   # ← 修复：去掉 openwrt- 前缀
            CACHE_KEY="imagebuilder-SNAPSHOT-mediatek-filogic-$(date -u '+%Y%m%d')"
          else
            DOWNLOAD_BASE="https://downloads.openwrt.org/releases/${VER}/targets/${TARGET}"
            BUILDER_NAME="openwrt-imagebuilder-${VER}-mediatek-filogic.Linux-x86_64"
            ORIG_FIRMWARE="openwrt-${VER}-mediatek-filogic-qihoo_360t7-squashfs-sysupgrade.itb"
            NIKKI_BRANCH="openwrt-${VER%.*}"
            CACHE_KEY="imagebuilder-${VER}-mediatek-filogic"
          fi

          echo "download_base=${DOWNLOAD_BASE}"   >> "$GITHUB_OUTPUT"
          echo "builder_name=${BUILDER_NAME}"     >> "$GITHUB_OUTPUT"
          echo "orig_firmware=${ORIG_FIRMWARE}"   >> "$GITHUB_OUTPUT"
          echo "nikki_branch=${NIKKI_BRANCH}"     >> "$GITHUB_OUTPUT"
          echo "cache_key=${CACHE_KEY}"           >> "$GITHUB_OUTPUT"

          echo ">>> download_base  : ${DOWNLOAD_BASE}"
          echo ">>> builder_name   : ${BUILDER_NAME}"
          echo ">>> orig_firmware  : ${ORIG_FIRMWARE}"
          echo ">>> nikki_branch   : ${NIKKI_BRANCH}"
          echo ">>> cache_key      : ${CACHE_KEY}"

      - name: 💾 Cache ImageBuilder
        id: cache-imagebuilder
        uses: actions/cache@v4
        with:
          path: imagebuilder
          key: ${{ steps.meta.outputs.cache_key }}

      - name: 📦 Download ImageBuilder (cache miss only)
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        run: |
          BUILDER_NAME="${{ steps.meta.outputs.builder_name }}"
          DOWNLOAD_BASE="${{ steps.meta.outputs.download_base }}"
          echo ">>> 下载 ImageBuilder..."
          echo ">>> URL: ${DOWNLOAD_BASE}/${BUILDER_NAME}.tar.zst"
          wget --progress=bar:force \
            "${DOWNLOAD_BASE}/${BUILDER_NAME}.tar.zst"
          echo ">>> 解压中..."
          tar --zstd -xf "${BUILDER_NAME}.tar.zst"
          mv "${BUILDER_NAME}" imagebuilder
          echo ">>> ImageBuilder 准备完成 ✅"

      - name: ✔️ Confirm ImageBuilder ready
        run: |
          if [ "${{ steps.cache-imagebuilder.outputs.cache-hit }}" = "true" ]; then
            echo "✅ ImageBuilder 来自缓存"
          else
            echo "✅ ImageBuilder 新鲜下载"
          fi

      - name: 🔌 Setup nikki feed
        run: |
          set -euo pipefail
          NIKKI_BASE="https://nikkinikki.pages.dev"
          NIKKI_BRANCH="${{ steps.meta.outputs.nikki_branch }}"
          NIKKI_FEED_URL="${NIKKI_BASE}/${NIKKI_BRANCH}/${ARCH}/nikki/packages.adb"
          echo ">>> nikki branch  : ${NIKKI_BRANCH}"
          echo ">>> nikki feed URL: ${NIKKI_FEED_URL}"

          APK_KEYS_DIR=$(find imagebuilder -path "*/apk/keys" -type d | head -1)
          [ -z "${APK_KEYS_DIR}" ] && APK_KEYS_DIR=$(find imagebuilder -name "keys" -type d | head -1)
          [ -z "${APK_KEYS_DIR}" ] && { echo "❌ 未找到 keys 目录"; exit 1; }

          wget -q "${NIKKI_BASE}/public-key.pem" -O "${APK_KEYS_DIR}/nikki.pem" || {
            echo "❌ nikki 公钥下载失败"; exit 1
          }
          echo ">>> 公钥已安装 ✅"

          REPO_CONF=$(find imagebuilder -maxdepth 2 -name "repositories.conf" | head -1)
          [ -z "${REPO_CONF}" ] && REPO_CONF=$(find imagebuilder -maxdepth 2 -name "repositories*" | head -1)
          [ -z "${REPO_CONF}" ] && { echo "❌ 未找到 repositories 配置文件"; exit 1; }

          echo "${NIKKI_FEED_URL}" >> "${REPO_CONF}"
          echo ">>> nikki feed 注册完成 ✅"
          cat "${REPO_CONF}"

      - name: 🔍 Verify profile exists
        run: |
          cd imagebuilder
          make info | grep -A3 "${PROFILE}" || {
            echo "❌ Profile '${PROFILE}' 不存在"
            make info; exit 1
          }
          echo ">>> Profile 确认存在 ✅"

      # ★ Build 之前生成 tag 和最终文件名
      - name: 🏷️ Generate release tag
        id: tag
        run: |
          DATETIME=$(date -u '+%Y%m%d%H%M')
          RUN_NUM="${{ github.run_number }}"
          TAG="${DATETIME}-${RUN_NUM}"
          FILENAME="openwrt-${OPENWRT_VERSION}-360t7-opns-${TAG}.itb"
          echo "tag=${TAG}"           >> "$GITHUB_OUTPUT"
          echo "filename=${FILENAME}" >> "$GITHUB_OUTPUT"
          echo ">>> Release tag     : ${TAG}"
          echo ">>> Firmware filename: ${FILENAME}"

      - name: 🏗️ Build firmware
        run: |
          set -euo pipefail
          cd imagebuilder

          APK_REAL=$(find "$(pwd)" -name "apk" -type f -executable ! -path "/tmp/*" | head -1)
          [ -z "${APK_REAL}" ] && { echo "❌ 未找到 apk 二进制"; exit 1; }

          mkdir -p /tmp/apk-wrapper
          printf '#!/bin/sh\nexec "%s" --allow-untrusted "$@"\n' "${APK_REAL}" > /tmp/apk-wrapper/apk
          chmod +x /tmp/apk-wrapper/apk
          export PATH="/tmp/apk-wrapper:${PATH}"

          echo ">>> 开始构建，时间: $(date)"
          make image \
            APK="/tmp/apk-wrapper/apk" \
            PROFILE="${PROFILE}" \
            PACKAGES="apk-mbedtls base-files ca-bundle dnsmasq-full dropbear \
              firewall4 fitblk fstools kmod-crypto-hw-safexcel \
              kmod-gpio-button-hotplug kmod-leds-gpio libc libgcc \
              libustream-mbedtls logd mtd netifd nftables odhcp6c \
              odhcpd-ipv6only ppp ppp-mod-pppoe procd-ujail uboot-envtools \
              uci uclient-fetch urandom-seed urngd wpad-basic-mbedtls \
              kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware luci \
              openssh-sftp-server zoneinfo-asia kmod-nft-offload kmod-nft-socket kmod-nft-tproxy kmod-tun \
              kmod-inet-diag ip-full kmod-dummy kmod-tcp-bbr sing-box \
              luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
              luci-i18n-package-manager-zh-cn luci-i18n-nikki-zh-cn" \
            FILES="../files"

          OUTDIR="bin/targets/mediatek/filogic"
          ORIG_NAME="${{ steps.meta.outputs.orig_firmware }}"
          SHORT_NAME="${{ steps.tag.outputs.filename }}"

          if [ -f "${OUTDIR}/${ORIG_NAME}" ]; then
            mv "${OUTDIR}/${ORIG_NAME}" "${OUTDIR}/${SHORT_NAME}"
            sed -i "s/${ORIG_NAME}/${SHORT_NAME}/g" "${OUTDIR}/sha256sums"
            echo ">>> 已重命名为：${SHORT_NAME} ✅"
          else
            echo "❌ 未找到原始固件：${ORIG_NAME}"
            ls -lh "${OUTDIR}/"
            exit 1
          fi

      - name: ✅ Verify output
        run: |
          cd imagebuilder
          OUTDIR="bin/targets/mediatek/filogic"
          ls -lh "${OUTDIR}/"
          cat "${OUTDIR}/sha256sums"
          echo "✅ 固件构建成功：${{ steps.tag.outputs.filename }}"

      - name: 📝 Generate release notes
        id: notes
        run: |
          cd imagebuilder
          OUTDIR="bin/targets/mediatek/filogic"
          FILENAME="${{ steps.tag.outputs.filename }}"
          FIRMWARE="${OUTDIR}/${FILENAME}"
          SHA256=$(grep "${FILENAME}" "${OUTDIR}/sha256sums" | awk '{print $1}')
          FILESIZE=$(ls -lh "${FIRMWARE}" | awk '{print $5}')
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > /tmp/release_notes.md << EOF
          ### 固件信息
          | 项目 | 值 |
          |------|-----|
          | OpenWrt 版本 | ${OPENWRT_VERSION} |
          | mihomo 版本 | ${MIHOMO_VERSION} |
          | 构建时间 | ${BUILD_TIME} |
          | 文件大小 | ${FILESIZE} |
          | SHA256 | \`${SHA256}\` |
          EOF
          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "OpenWrt ${{ env.OPENWRT_VERSION }} for 360T7 · ${{ steps.tag.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: ${{ env.OPENWRT_VERSION == 'SNAPSHOT' }}
          files: |
            imagebuilder/bin/targets/mediatek/filogic/${{ steps.tag.outputs.filename }}
            imagebuilder/bin/targets/mediatek/filogic/sha256sums
          fail_on_unmatched_files: true
