name: Build OpenWrt for Qihoo 360T7

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-openwrt.yml'
      - 'files/**'

env:
  OPENWRT_VERSION: "25.12.2"
  TARGET: "mediatek/filogic"
  PROFILE: "qihoo_360t7"
  ARCH: "aarch64_cortex-a53"
  SINGBOX_VERSION: "1.13.5"
  MIHOMO_VERSION: "1.19.22"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.2.2

      - name: 🔧 Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses-dev zlib1g-dev gawk \
            gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils

      - name: 💾 Cache ImageBuilder
        id: cache-imagebuilder
        uses: actions/cache@v4
        with:
          path: imagebuilder
          key: imagebuilder-${{ env.OPENWRT_VERSION }}-mediatek-filogic

      - name: 📦 Download ImageBuilder (cache miss only)
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        run: |
          BUILDER="openwrt-imagebuilder-${OPENWRT_VERSION}-mediatek-filogic.Linux-x86_64"
          wget "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${BUILDER}.tar.zst"
          tar --zstd -xf "${BUILDER}.tar.zst"
          mv "${BUILDER}" imagebuilder

      - name: 🔌 Setup nikki feed (stable)
        run: |
          set -euo pipefail

          OPENWRT_MAJOR="${OPENWRT_VERSION%.*}"
          NIKKI_TAR="nikki_${ARCH}-openwrt-${OPENWRT_MAJOR}.tar.gz"
          NIKKI_URL="https://github.com/nikkinikki-org/OpenWrt-nikki/releases/latest/download/${NIKKI_TAR}"

          WORKDIR="/tmp/nikki-feed"
          rm -rf "${WORKDIR}"
          mkdir -p "${WORKDIR}"

          # 安装公钥（固定路径，避免版本差异）
          APK_KEYS_DIR="imagebuilder/etc/apk/keys"
          mkdir -p "${APK_KEYS_DIR}"
          wget -q "https://nikkinikki.pages.dev/public-key.pem" -O "${APK_KEYS_DIR}/nikki.pem"

          # 下载
          wget "${NIKKI_URL}" -O "${WORKDIR}/nikki.tar.gz"

          # 解压
          tar -xzf "${WORKDIR}/nikki.tar.gz" -C "${WORKDIR}"

          # 自动找 feed 目录
          FEED_DIR=""
          FOUND="$(find "${WORKDIR}" -name 'packages.adb' | head -1 || true)"
          if [ -n "${FOUND}" ]; then FEED_DIR="$(dirname "${FOUND}")"; fi

          if [ -z "${FEED_DIR}" ]; then
            FOUND="$(find "${WORKDIR}" -name 'APKINDEX.tar.gz' | head -1 || true)"
            if [ -n "${FOUND}" ]; then FEED_DIR="$(dirname "${FOUND}")"; fi
          fi

          if [ -z "${FEED_DIR}" ]; then
            FOUND="$(find "${WORKDIR}" -name '*.apk' | head -1 || true)"
            if [ -n "${FOUND}" ]; then FEED_DIR="$(dirname "${FOUND}")"; fi
          fi

          if [ -z "${FEED_DIR}" ]; then
            echo "❌ 无法定位 feed"
            find "${WORKDIR}"
            exit 1
          fi

          # 没有索引就生成
          if [ ! -f "${FEED_DIR}/packages.adb" ] && [ ! -f "${FEED_DIR}/APKINDEX.tar.gz" ]; then
            APK_BIN="$(find imagebuilder -name apk -type f -executable | head -1)"
            cd "${FEED_DIR}"
            if "${APK_BIN}" mkndx --help >/dev/null 2>&1; then
              "${APK_BIN}" mkndx --output packages.adb *.apk
            else
              "${APK_BIN}" index --output APKINDEX.tar.gz *.apk
            fi
            cd -
          fi

          # 写入 repositories
          cd imagebuilder
          REPO_FILE="$(find . -maxdepth 2 -name 'repositories*' | head -1)"

          if ! grep -q "${FEED_DIR}" "${REPO_FILE}"; then
            echo "src/gz nikki_local file://${FEED_DIR}" >> "${REPO_FILE}"
          fi

          # 关闭签名（CI 必备稳定项）
          if ! grep -q "check_signature 0" "${REPO_FILE}"; then
            echo "option check_signature 0" >> "${REPO_FILE}"
          fi

      - name: 🔧 Inject sing-box
        run: |
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-linux-arm64.tar.gz"
          tar -xzf sing-box-*.tar.gz
          cp */sing-box files/usr/bin/ || mkdir -p files/usr/bin && cp */sing-box files/usr/bin/
          chmod +x files/usr/bin/sing-box

      - name: 🔧 Inject mihomo
        run: |
          wget -q "https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-arm64-v${MIHOMO_VERSION}.gz"
          gunzip mihomo-linux-arm64-*.gz
          mkdir -p files/usr/bin
          cp mihomo files/usr/bin/
          chmod +x files/usr/bin/mihomo

      - name: 🏗️ Build firmware
        run: |
          cd imagebuilder
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES="luci nikki luci-app-nikki sing-box" \
            FILES="../files"

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: imagebuilder/bin/targets/mediatek/filogic/*sysupgrade*
