name: Build OpenWrt for Qihoo 360T7

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-openwrt.yml'
      - 'files/**'

env:
  OPENWRT_VERSION: "25.12.2"
  TARGET: "mediatek/filogic"
  PROFILE: "qihoo_360t7"
  ARCH: "aarch64_cortex-a53"
  SINGBOX_VERSION: "1.13.5"
  MIHOMO_VERSION: "1.19.22"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.2.2

      - name: 🔧 Install dependencies
        run: |
          echo ">>> 安装构建依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses-dev zlib1g-dev gawk \
            gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils
          echo ">>> 依赖安装完成"

      - name: 📦 Download ImageBuilder
        run: |
          BUILDER="openwrt-imagebuilder-${OPENWRT_VERSION}-mediatek-filogic.Linux-x86_64"
          echo ">>> 下载 ImageBuilder ${OPENWRT_VERSION}..."
          wget --progress=bar:force \
            "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${BUILDER}.tar.zst"
          echo ">>> 解压中..."
          tar --zstd -xf "${BUILDER}.tar.zst"
          mv "${BUILDER}" imagebuilder
          echo ">>> ImageBuilder 准备完成"

      - name: 🔌 Build local nikki mirror & register as file:// feed
        run: |
          set -euo pipefail

          OPENWRT_MAJOR="${OPENWRT_VERSION%.*}"
          NIKKI_BASE="https://nikkinikki.pages.dev/openwrt-${OPENWRT_MAJOR}/${ARCH}/nikki"

          MIRROR_DIR="/tmp/nikki-mirror/${ARCH}"
          mkdir -p "${MIRROR_DIR}"

          echo ">>> 下载 nikki APK 包..."
          wget -q "${NIKKI_BASE}/nikki-2026.03.10-r3.apk" \
               -O "${MIRROR_DIR}/nikki-2026.03.10-r3.apk"
          wget -q "${NIKKI_BASE}/luci-app-nikki-1.25.3-r1.apk" \
               -O "${MIRROR_DIR}/luci-app-nikki-1.25.3-r1.apk"
          wget -q "${NIKKI_BASE}/luci-i18n-nikki-zh-cn-26.088.44343~a20a48b.apk" \
               -O "${MIRROR_DIR}/luci-i18n-nikki-zh-cn-26.088.44343~a20a48b.apk"

          echo ">>> 下载 APKINDEX.tar.gz..."
          wget -q "${NIKKI_BASE}/APKINDEX.tar.gz" \
               -O "${MIRROR_DIR}/APKINDEX.tar.gz"

          echo ">>> 验证 APKINDEX.tar.gz 格式..."
          echo "文件类型："
          file "${MIRROR_DIR}/APKINDEX.tar.gz"
          echo "文件头（hex）："
          xxd "${MIRROR_DIR}/APKINDEX.tar.gz" | head -5

          if ! tar -tzf "${MIRROR_DIR}/APKINDEX.tar.gz" > /dev/null 2>&1; then
            echo "❌ APKINDEX.tar.gz 不是合法 tar.gz，尝试直接使用在线 feed..."
            # 回退：直接写在线 feed URL，跳过本地镜像
            ONLINE_FEED="https://nikkinikki.pages.dev/openwrt-${OPENWRT_MAJOR}/${ARCH}/nikki"
            cd imagebuilder
            REPO_FILE=$(find . -maxdepth 2 -name "repositories*" -not -path "*/\.*" | head -1)
            echo "${ONLINE_FEED}" >> "${REPO_FILE}"
            echo ">>> 已回退到在线 feed：${ONLINE_FEED}"
            cat "${REPO_FILE}"
            exit 0
          fi
          echo ">>> APKINDEX.tar.gz 验证通过 ✅"

          echo ">>> 本地镜像内容："
          ls -lh "${MIRROR_DIR}/"

          echo ">>> 下载 nikki 签名公钥..."
          APK_KEYS_DIR=$(find imagebuilder -path "*/apk/keys" -type d 2>/dev/null | head -1)
          if [ -n "${APK_KEYS_DIR}" ]; then
            wget -q "https://nikkinikki.pages.dev/public-key.pem" \
                 -O "${APK_KEYS_DIR}/nikki.pem"
            echo ">>> 公钥已安装：${APK_KEYS_DIR}/nikki.pem"
          else
            echo ">>> 未找到 apk keys 目录，跳过公钥安装"
          fi

          echo ">>> 注册本地镜像到 repositories..."
          cd imagebuilder
          REPO_FILE=$(find . -maxdepth 2 -name "repositories*" -not -path "*/\.*" | head -1)
          echo ">>> 使用配置文件：${REPO_FILE}"
          echo ">>> 追加前内容："
          cat "${REPO_FILE}"

          # 直接指向含有 APKINDEX.tar.gz 的目录层级
          echo "file:///tmp/nikki-mirror/${ARCH}" >> "${REPO_FILE}"

          echo ""
          echo ">>> 追加后内容："
          cat "${REPO_FILE}"
          echo ">>> nikki 本地镜像注册完成 ✅"

      - name: 🔧 Inject sing-box ${{ env.SINGBOX_VERSION }} binary (linux-arm64 → files overlay)
        run: |
          set -euo pipefail
          SINGBOX_TAR="sing-box-${SINGBOX_VERSION}-linux-arm64.tar.gz"
          SINGBOX_URL="https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/${SINGBOX_TAR}"

          echo ">>> 下载 sing-box ${SINGBOX_VERSION} (linux-arm64)..."
          wget -q "${SINGBOX_URL}" -O "${SINGBOX_TAR}"

          echo ">>> 解包 tar.gz..."
          mkdir -p singbox_extract
          tar -xzf "${SINGBOX_TAR}" -C singbox_extract

          echo ">>> 包内容结构："
          find singbox_extract -type f | sort

          SINGBOX_BIN=$(find singbox_extract -type f -name "sing-box" | head -1)
          if [ -z "${SINGBOX_BIN}" ]; then
            echo "❌ 未在压缩包中找到 sing-box 二进制"
            exit 1
          fi
          echo ">>> 找到二进制：${SINGBOX_BIN}"

          echo ">>> 注入到 files overlay → /usr/bin/sing-box"
          mkdir -p files/usr/bin
          cp "${SINGBOX_BIN}" files/usr/bin/sing-box
          chmod +x files/usr/bin/sing-box

          echo ">>> 二进制信息："
          file files/usr/bin/sing-box
          echo ">>> sing-box 注入完成 ✅"

      - name: 🔧 Inject mihomo ${{ env.MIHOMO_VERSION }} binary (linux/arm64 → files overlay)
        run: |
          set -euo pipefail
          MIHOMO_GZ="mihomo-linux-arm64-v${MIHOMO_VERSION}.gz"
          MIHOMO_URL="https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/${MIHOMO_GZ}"

          echo ">>> 下载 mihomo ${MIHOMO_VERSION} (linux/arm64)..."
          wget -q "${MIHOMO_URL}" -O mihomo.gz

          echo ">>> 解压 gz..."
          gunzip -f mihomo.gz

          echo ">>> 注入到 files overlay → /usr/bin/mihomo"
          mkdir -p files/usr/bin
          cp mihomo files/usr/bin/mihomo
          chmod +x files/usr/bin/mihomo

          echo ">>> 二进制信息："
          file files/usr/bin/mihomo
          echo ">>> mihomo 注入完成 ✅"

      - name: 🔍 Verify profile exists
        run: |
          echo ">>> 检查设备 Profile 是否存在..."
          cd imagebuilder
          make info | grep -A3 "${PROFILE}" || {
            echo "❌ Profile '${PROFILE}' 不存在"
            make info
            exit 1
          }
          echo ">>> Profile 确认存在 ✅"

      - name: 🏗️ Build firmware
        run: |
          set -euo pipefail
          cd imagebuilder
          echo ">>> 开始构建固件，Profile: ${PROFILE}"
          echo ">>> 版本: ${OPENWRT_VERSION}"
          echo ">>> 时间: $(date)"
          echo "---"
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES="apk-mbedtls base-files ca-bundle dnsmasq-full dropbear \
              firewall4 fitblk fstools kmod-crypto-hw-safexcel \
              kmod-gpio-button-hotplug kmod-leds-gpio libc libgcc \
              libustream-mbedtls logd mtd netifd nftables odhcp6c \
              odhcpd-ipv6only ppp ppp-mod-pppoe procd-ujail uboot-envtools \
              uci uclient-fetch urandom-seed urngd wpad-basic-mbedtls \
              kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware luci \
              openssh-sftp-server zoneinfo-asia curl yq \
              kmod-nft-offload kmod-nft-socket kmod-nft-tproxy kmod-tun \
              kmod-inet-diag ip-full kmod-dummy kmod-tcp-bbr \
              luci-app-attendedsysupgrade luci-i18n-attendedsysupgrade-zh-cn \
              luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
              luci-i18n-package-manager-zh-cn \
              nikki luci-app-nikki luci-i18n-nikki-zh-cn \
              sing-box" \
            FILES="../files"
          echo "---"
          echo ">>> 构建完成，时间: $(date)"

      - name: ✅ Verify output
        run: |
          echo ">>> 检查输出文件..."
          cd imagebuilder
          SYSUPGRADE=$(ls bin/targets/mediatek/filogic/*sysupgrade* 2>/dev/null)
          if [ -z "$SYSUPGRADE" ]; then
            echo "❌ 未找到 sysupgrade 固件"
            exit 1
          fi
          echo ">>> 固件文件列表："
          ls -lh bin/targets/mediatek/filogic/
          echo ""
          echo ">>> SHA256 校验值："
          cat bin/targets/mediatek/filogic/sha256sums
          echo ""
          echo "✅ 固件构建成功：$(basename $SYSUPGRADE)"

      - name: 📤 Upload firmware artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: openwrt-360T7-${{ env.OPENWRT_VERSION }}-${{ github.run_number }}
          path: |
            imagebuilder/bin/targets/mediatek/filogic/*sysupgrade*
            imagebuilder/bin/targets/mediatek/filogic/sha256sums
          retention-days: 30
          if-no-files-found: error

      - name: 🏷️ Generate release tag
        id: tag
        run: |
          DATE=$(date -u '+%Y%m%d')
          TAG="v${OPENWRT_VERSION}-${DATE}-r${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo ">>> Release tag: ${TAG}"

      - name: 📝 Generate release notes
        id: notes
        run: |
          cd imagebuilder
          SYSUPGRADE=$(ls bin/targets/mediatek/filogic/*sysupgrade* 2>/dev/null | head -1)
          FILENAME=$(basename "${SYSUPGRADE}")
          SHA256=$(grep "${FILENAME}" bin/targets/mediatek/filogic/sha256sums | awk '{print $1}')
          FILESIZE=$(ls -lh "${SYSUPGRADE}" | awk '{print $5}')
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > /tmp/release_notes.md << EOF
          ## OpenWrt 固件 - Qihoo 360T7

          | 项目 | 值 |
          |------|-----|
          | OpenWrt 版本 | \`${OPENWRT_VERSION}\` |
          | sing-box 版本 | \`${SINGBOX_VERSION}\` |
          | mihomo 版本 | \`${MIHOMO_VERSION}\` |
          | 构建时间 | ${BUILD_TIME} |
          | 固件大小 | ${FILESIZE} |
          | Commit | \`${{ github.sha }}\` |

          ### 内置组件

          - **nikki** (luci-app-nikki) \`2026.03.10-r3\`，mihomo 内核已升级至 \`v${MIHOMO_VERSION}\`
          - **sing-box** \`${SINGBOX_VERSION}\`（官方 linux-arm64，完全适配 360T7/aarch64_cortex-a53）
          - **LuCI** 中文界面
          - dnsmasq-full / nftables / kmod-tun / kmod-nft-tproxy 等透明代理依赖

          ### 二进制覆盖说明

          > nikki APK 自带 mihomo \`1.19.21\`，本固件通过 files overlay 将其替换为 \`${MIHOMO_VERSION}\`。
          > sing-box APK（官方仓库 \`1.12.17\`）的 init 脚本保留，二进制通过官方 linux-arm64 tar.gz 替换为 \`${SINGBOX_VERSION}\`。

          ### SHA256 校验

          \`\`\`
          ${SHA256}  ${FILENAME}
          \`\`\`

          ### 刷写说明

          > ⚠️ 首次从其他固件切换请先备份配置

          **保留配置刷入：**
          \`\`\`
          sysupgrade -v /tmp/${FILENAME}
          \`\`\`

          **不保留配置（推荐首次刷入）：**
          \`\`\`
          sysupgrade -n /tmp/${FILENAME}
          \`\`\`
          EOF

          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "OpenWrt ${{ env.OPENWRT_VERSION }} for 360T7 · ${{ steps.tag.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            imagebuilder/bin/targets/mediatek/filogic/*sysupgrade*
            imagebuilder/bin/targets/mediatek/filogic/sha256sums
          fail_on_unmatched_files: true
