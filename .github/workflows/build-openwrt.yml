name: Build OpenWrt for Qihoo 360T7

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-openwrt.yml'
      - 'files/**'

env:
  OPENWRT_VERSION: "25.12.2"
  TARGET: "mediatek/filogic"
  PROFILE: "qihoo_360t7"
  ARCH: "aarch64_cortex-a53"
  SINGBOX_VERSION: "1.13.5"
  MIHOMO_VERSION: "1.19.22"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.2.2

      - name: 🔧 Install dependencies
        run: |
          echo ">>> 安装构建依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses-dev zlib1g-dev gawk \
            gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils
          echo ">>> 依赖安装完成"

      - name: 💾 Cache ImageBuilder
        id: cache-imagebuilder
        uses: actions/cache@v4
        with:
          path: imagebuilder
          key: imagebuilder-${{ env.OPENWRT_VERSION }}-mediatek-filogic

      - name: 📦 Download ImageBuilder (cache miss only)
        if: steps.cache-imagebuilder.outputs.cache-hit != 'true'
        run: |
          BUILDER="openwrt-imagebuilder-${OPENWRT_VERSION}-mediatek-filogic.Linux-x86_64"
          echo ">>> 缓存未命中，下载 ImageBuilder ${OPENWRT_VERSION}..."
          wget --progress=bar:force \
            "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${BUILDER}.tar.zst"
          echo ">>> 解压中..."
          tar --zstd -xf "${BUILDER}.tar.zst"
          mv "${BUILDER}" imagebuilder
          echo ">>> ImageBuilder 准备完成"

      - name: ✔️ Confirm ImageBuilder ready
        run: |
          if [ "${{ steps.cache-imagebuilder.outputs.cache-hit }}" = "true" ]; then
            echo "✅ ImageBuilder 来自缓存（版本 ${OPENWRT_VERSION}）"
          else
            echo "✅ ImageBuilder 新鲜下载（版本 ${OPENWRT_VERSION}）"
          fi

      - name: 🔌 Setup nikki feed from release tarball
        run: |
          set -euo pipefail

          OPENWRT_MAJOR="${OPENWRT_VERSION%.*}"   # 25.12
          NIKKI_TAR="nikki_${ARCH}-openwrt-${OPENWRT_MAJOR}.tar.gz"
          NIKKI_URL="https://github.com/nikkinikki-org/OpenWrt-nikki/releases/latest/download/${NIKKI_TAR}"

          # ---------------------------------------------------------------
          # 第一步：安装 nikki 签名公钥
          # ---------------------------------------------------------------
          echo ">>> [1/3] 安装 nikki 签名公钥..."
          APK_KEYS_DIR=$(find imagebuilder -path "*/apk/keys" -type d | head -1)
          if [ -z "${APK_KEYS_DIR}" ]; then
            echo ">>> apk/keys 未找到，尝试回退到 keys 目录..."
            APK_KEYS_DIR=$(find imagebuilder -name "keys" -type d | head -1)
          fi
          if [ -z "${APK_KEYS_DIR}" ]; then
            echo "❌ 未找到任何 keys 目录，当前 imagebuilder 结构："
            find imagebuilder -name "keys" -type d
            exit 1
          fi
          echo ">>> keys 目录：${APK_KEYS_DIR}"
          wget -q "https://nikkinikki.pages.dev/public-key.pem" \
               -O "${APK_KEYS_DIR}/nikki.pem"
          echo ">>> 公钥已安装：${APK_KEYS_DIR}/nikki.pem ✅"
          ls -lh "${APK_KEYS_DIR}/"

          # ---------------------------------------------------------------
          # 第二步：下载并解压完整 release tarball
          # tarball 内含全部 APK（包括 i18n）及 packages.adb
          # ---------------------------------------------------------------
          echo ">>> [2/3] 下载 ${NIKKI_TAR}..."
          echo "    URL: ${NIKKI_URL}"
          wget --progress=bar:force "${NIKKI_URL}" -O nikki-release.tar.gz

          echo ">>> 解压中..."
          mkdir -p /tmp/nikki-feed
          tar -xzf nikki-release.tar.gz -C /tmp/nikki-feed/

          echo ">>> 解压后全部文件："
          find /tmp/nikki-feed -type f | sort

          # 定位含 APK 文件的目录
          APK_SRC=$(find /tmp/nikki-feed -name "*.apk" | head -1)
          if [ -z "${APK_SRC}" ]; then
            echo "❌ tarball 内未找到任何 .apk 文件"
            exit 1
          fi
          FEED_SRC=$(dirname "${APK_SRC}")
          echo ">>> APK 源目录：${FEED_SRC}"
          ls -lh "${FEED_SRC}/"

          # ---------------------------------------------------------------
          # 第三步：按 APK 期望的目录结构组织 feed 并注册
          # APK 查找 feed 时会自动追加 $ARCH/ 子目录，结构必须为：
          #   /tmp/nikki-repo/$ARCH/packages.adb
          #   /tmp/nikki-repo/$ARCH/*.apk
          # ---------------------------------------------------------------
          echo ">>> [3/3] 组织 feed 目录结构并注册..."

          NIKKI_REPO="/tmp/nikki-repo"
          NIKKI_PKG_DIR="${NIKKI_REPO}/${ARCH}"
          mkdir -p "${NIKKI_PKG_DIR}"

          # 复制所有 nikki APK 到 $ARCH 子目录
          cp "${FEED_SRC}"/*.apk "${NIKKI_PKG_DIR}/"
          echo ">>> 已复制以下 APK 至 ${NIKKI_PKG_DIR}："
          ls -lh "${NIKKI_PKG_DIR}/"

          # 生成两种格式的索引（APK 对 file:// 优先找 APKINDEX.tar.gz）
          APK_BIN=$(find imagebuilder -name "apk" -type f -executable | head -1)
          if [ -z "${APK_BIN}" ]; then
            echo "❌ 未找到 apk 工具"; exit 1
          fi
          echo ">>> apk 工具：${APK_BIN}，版本：$("${APK_BIN}" --version)"

          cd "${NIKKI_PKG_DIR}"

          # 格式一：packages.adb（新格式）
          "${OLDPWD}/${APK_BIN}" mkndx \
            --allow-untrusted \
            --output packages.adb \
            --description "nikki feed" \
            *.apk
          echo ">>> packages.adb 生成完成 ✅"

          # 格式二：APKINDEX.tar.gz（旧格式，file:// 优先查找）
          python3 << 'PYEOF'
import tarfile, io, os, glob, hashlib, base64

def parse_pkginfo(content):
    fields = {}
    for line in content.splitlines():
        if line.startswith('#') or '=' not in line:
            continue
        k, v = line.split('=', 1)
        fields[k.strip()] = v.strip()
    return fields

entries = []
for apk_path in sorted(glob.glob('*.apk')):
    try:
        with tarfile.open(apk_path, 'r:gz') as apk:
            pi = apk.extractfile('.PKGINFO').read().decode()
        f = parse_pkginfo(pi)
        chk = 'Q1' + base64.b64encode(
            hashlib.sha1(open(apk_path,'rb').read()).digest()
        ).decode()
        lines = [
            f"C:{chk}",
            f"P:{f.get('pkgname','')}",
            f"V:{f.get('pkgver','')}",
            f"A:{f.get('arch','')}",
            f"S:{os.path.getsize(apk_path)}",
            f"I:{f.get('size','0')}",
            f"T:{f.get('pkgdesc','')}",
            f"U:{f.get('url','')}",
            f"L:{f.get('license','')}",
        ]
        for key, tag in [('origin','o'),('maintainer','m'),
                         ('builddate','t'),('depend','D'),('provides','p')]:
            if key in f:
                lines.append(f"{tag}:{f[key]}")
        lines.append('')
        entries.append('\n'.join(lines))
        print(f"  indexed: {f.get('pkgname',apk_path)}")
    except Exception as e:
        print(f"  warning: {apk_path}: {e}")

idx = '\n'.join(entries).encode()
buf = io.BytesIO()
with tarfile.open(fileobj=buf, mode='w:gz') as tar:
    info = tarfile.TarInfo(name='APKINDEX')
    info.size = len(idx)
    tar.addfile(info, io.BytesIO(idx))
with open('APKINDEX.tar.gz', 'wb') as f:
    f.write(buf.getvalue())
print(f"APKINDEX.tar.gz 生成完成，共 {len(entries)} 个包 ✅")
PYEOF

          cd "${OLDPWD}"
          echo ">>> 索引文件："
          ls -lh "${NIKKI_PKG_DIR}/"

          # 注册 feed：URL 只到 /tmp/nikki-repo，APK 自动追加 /$ARCH/
          cd imagebuilder
          REPO_FILE=$(find . -maxdepth 2 -name "repositories*" \
                        -not -path "*/\.*" | head -1)
          echo ">>> 配置文件：${REPO_FILE}"
          echo "file://${NIKKI_REPO}" >> "${REPO_FILE}"
          echo ">>> 注册后 repositories 内容："
          cat "${REPO_FILE}"
          echo ">>> nikki feed 注册完成 ✅"

      - name: 🔧 Inject sing-box ${{ env.SINGBOX_VERSION }} binary (linux-arm64 → files overlay)
        run: |
          set -euo pipefail
          SINGBOX_TAR="sing-box-${SINGBOX_VERSION}-linux-arm64.tar.gz"
          SINGBOX_URL="https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/${SINGBOX_TAR}"

          echo ">>> 下载 sing-box ${SINGBOX_VERSION} (linux-arm64)..."
          wget -q "${SINGBOX_URL}" -O "${SINGBOX_TAR}"

          mkdir -p singbox_extract
          tar -xzf "${SINGBOX_TAR}" -C singbox_extract

          SINGBOX_BIN=$(find singbox_extract -type f -name "sing-box" | head -1)
          if [ -z "${SINGBOX_BIN}" ]; then
            echo "❌ 未在压缩包中找到 sing-box 二进制"
            exit 1
          fi

          mkdir -p files/usr/bin
          cp "${SINGBOX_BIN}" files/usr/bin/sing-box
          chmod +x files/usr/bin/sing-box

          file files/usr/bin/sing-box
          echo ">>> sing-box 注入完成 ✅"

      - name: 🔧 Inject mihomo ${{ env.MIHOMO_VERSION }} binary (linux/arm64 → files overlay)
        run: |
          set -euo pipefail
          MIHOMO_GZ="mihomo-linux-arm64-v${MIHOMO_VERSION}.gz"
          MIHOMO_URL="https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/${MIHOMO_GZ}"

          echo ">>> 下载 mihomo ${MIHOMO_VERSION} (linux/arm64)..."
          wget -q "${MIHOMO_URL}" -O mihomo.gz
          gunzip -f mihomo.gz

          mkdir -p files/usr/bin
          cp mihomo files/usr/bin/mihomo
          chmod +x files/usr/bin/mihomo

          file files/usr/bin/mihomo
          echo ">>> mihomo 注入完成 ✅"

      - name: 🔍 Verify profile exists
        run: |
          cd imagebuilder
          make info | grep -A3 "${PROFILE}" || {
            echo "❌ Profile '${PROFILE}' 不存在"
            make info
            exit 1
          }
          echo ">>> Profile 确认存在 ✅"

      - name: 🏗️ Build firmware
        run: |
          set -euo pipefail
          cd imagebuilder
          echo ">>> 开始构建固件，Profile: ${PROFILE}，时间: $(date)"
          echo "---"
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES="apk-mbedtls base-files ca-bundle dnsmasq-full dropbear \
              firewall4 fitblk fstools kmod-crypto-hw-safexcel \
              kmod-gpio-button-hotplug kmod-leds-gpio libc libgcc \
              libustream-mbedtls logd mtd netifd nftables odhcp6c \
              odhcpd-ipv6only ppp ppp-mod-pppoe procd-ujail uboot-envtools \
              uci uclient-fetch urandom-seed urngd wpad-basic-mbedtls \
              kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware luci \
              openssh-sftp-server zoneinfo-asia curl yq \
              kmod-nft-offload kmod-nft-socket kmod-nft-tproxy kmod-tun \
              kmod-inet-diag ip-full kmod-dummy kmod-tcp-bbr \
              luci-app-attendedsysupgrade luci-i18n-attendedsysupgrade-zh-cn \
              luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
              luci-i18n-package-manager-zh-cn \
              nikki luci-app-nikki luci-i18n-nikki-zh-cn \
              sing-box" \
            FILES="../files"
          echo "---"
          echo ">>> 构建完成，时间: $(date)"

      - name: ✅ Verify output
        run: |
          cd imagebuilder
          SYSUPGRADE=$(ls bin/targets/mediatek/filogic/*sysupgrade* 2>/dev/null)
          if [ -z "$SYSUPGRADE" ]; then
            echo "❌ 未找到 sysupgrade 固件"
            exit 1
          fi
          ls -lh bin/targets/mediatek/filogic/
          echo ""
          cat bin/targets/mediatek/filogic/sha256sums
          echo ""
          echo "✅ 固件构建成功：$(basename $SYSUPGRADE)"

      - name: 📤 Upload firmware artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: openwrt-360T7-${{ env.OPENWRT_VERSION }}-${{ github.run_number }}
          path: |
            imagebuilder/bin/targets/mediatek/filogic/*sysupgrade*
            imagebuilder/bin/targets/mediatek/filogic/sha256sums
          retention-days: 30
          if-no-files-found: error

      - name: 🏷️ Generate release tag
        id: tag
        run: |
          DATE=$(date -u '+%Y%m%d')
          TAG="v${OPENWRT_VERSION}-${DATE}-r${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo ">>> Release tag: ${TAG}"

      - name: 📝 Generate release notes
        id: notes
        run: |
          cd imagebuilder
          SYSUPGRADE=$(ls bin/targets/mediatek/filogic/*sysupgrade* 2>/dev/null | head -1)
          FILENAME=$(basename "${SYSUPGRADE}")
          SHA256=$(grep "${FILENAME}" bin/targets/mediatek/filogic/sha256sums | awk '{print $1}')
          FILESIZE=$(ls -lh "${SYSUPGRADE}" | awk '{print $5}')
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > /tmp/release_notes.md << EOF
          ## OpenWrt 固件 - Qihoo 360T7

          | 项目 | 值 |
          |------|-----|
          | OpenWrt 版本 | \`${OPENWRT_VERSION}\` |
          | sing-box 版本 | \`${SINGBOX_VERSION}\` |
          | mihomo 版本 | \`${MIHOMO_VERSION}\` |
          | 构建时间 | ${BUILD_TIME} |
          | 固件大小 | ${FILESIZE} |
          | Commit | \`${{ github.sha }}\` |

          ### 内置组件

          - **nikki** (luci-app-nikki)，mihomo 内核已升级至 \`v${MIHOMO_VERSION}\`
          - **sing-box** \`${SINGBOX_VERSION}\`（官方 linux-arm64，完全适配 360T7/aarch64_cortex-a53）
          - **LuCI** 中文界面
          - dnsmasq-full / nftables / kmod-tun / kmod-nft-tproxy 等透明代理依赖

          ### 二进制覆盖说明

          > nikki 自带 mihomo，本固件通过 files overlay 将其替换为 \`${MIHOMO_VERSION}\`。
          > sing-box 的 init 脚本保留，二进制通过官方 linux-arm64 tar.gz 替换为 \`${SINGBOX_VERSION}\`。

          ### SHA256 校验

          \`\`\`
          ${SHA256}  ${FILENAME}
          \`\`\`

          ### 刷写说明

          > ⚠️ 首次从其他固件切换请先备份配置

          **保留配置刷入：**
          \`\`\`
          sysupgrade -v /tmp/${FILENAME}
          \`\`\`

          **不保留配置（推荐首次刷入）：**
          \`\`\`
          sysupgrade -n /tmp/${FILENAME}
          \`\`\`
          EOF

          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "OpenWrt ${{ env.OPENWRT_VERSION }} for 360T7 · ${{ steps.tag.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            imagebuilder/bin/targets/mediatek/filogic/*sysupgrade*
            imagebuilder/bin/targets/mediatek/filogic/sha256sums
          fail_on_unmatched_files: true
