name: Build OpenWrt for Qihoo 360T7

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-openwrt.yml'
      - 'files/**'

env:
  OPENWRT_VERSION: "25.12.2"
  TARGET: "mediatek/filogic"
  PROFILE: "qihoo_360t7"
  ARCH: "aarch64_cortex-a53"
  SINGBOX_VERSION: "1.13.5"
  MIHOMO_VERSION: "1.19.22"

permissions:
  contents: write   # 允许创建 Release 和上传 Assets

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4.2.2

      - name: 🔧 Install dependencies
        run: |
          echo ">>> 安装构建依赖..."
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential libncurses-dev zlib1g-dev gawk \
            gettext libssl-dev xsltproc rsync wget unzip python3 \
            qemu-utils
          echo ">>> 依赖安装完成"

      - name: 📦 Download ImageBuilder
        run: |
          BUILDER="openwrt-imagebuilder-${OPENWRT_VERSION}-mediatek-filogic.Linux-x86_64"
          echo ">>> 下载 ImageBuilder ${OPENWRT_VERSION}..."
          wget --progress=bar:force \
            "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/${TARGET}/${BUILDER}.tar.zst"
          echo ">>> 解压中..."
          tar --zstd -xf "${BUILDER}.tar.zst"
          mv "${BUILDER}" imagebuilder
          echo ">>> ImageBuilder 准备完成"

      - name: 🔌 Download nikki packages into ImageBuilder local packages dir
        run: |
          set -euo pipefail
          cd imagebuilder

          OPENWRT_MAJOR="${OPENWRT_VERSION%.*}"
          NIKKI_FEED="https://nikkinikki.pages.dev/openwrt-${OPENWRT_MAJOR}/${ARCH}/nikki"

          echo ">>> OpenWrt Major: ${OPENWRT_MAJOR}"
          echo ">>> ARCH:          ${ARCH}"
          echo ">>> nikki feed:    ${NIKKI_FEED}"

          mkdir -p packages

          echo ">>> 下载 nikki apk 包到本地 packages 目录..."
          wget -q "${NIKKI_FEED}/nikki-2026.03.10-r3.apk"             -O packages/nikki-2026.03.10-r3.apk
          wget -q "${NIKKI_FEED}/luci-app-nikki-1.25.3-r1.apk"        -O packages/luci-app-nikki-1.25.3-r1.apk
          wget -q "${NIKKI_FEED}/luci-i18n-nikki-zh-cn-26.088.44343~a20a48b.apk" \
               -O "packages/luci-i18n-nikki-zh-cn-26.088.44343~a20a48b.apk"

          echo ">>> 下载完成，packages 目录内容："
          ls -lh packages/*.apk

      # ---------------------------------------------------------------
      # sing-box 1.13.5 二进制注入
      # 官方提供 openwrt_aarch64_cortex-a53 专属 APK，与 360T7 完全匹配
      # APK 本质是 tar+gz，用 tar 解包后提取 usr/bin/sing-box
      # PACKAGES 里保留官方 sing-box 包（1.12.17）获取 init 脚本等
      # files/ 覆盖让最终固件的 /usr/bin/sing-box 为 1.13.5
      # ---------------------------------------------------------------
      - name: 🔧 Inject sing-box ${{ env.SINGBOX_VERSION }} binary (openwrt/aarch64_cortex-a53 → files overlay)
        run: |
          set -euo pipefail
          SINGBOX_APK="sing-box_${SINGBOX_VERSION}_openwrt_aarch64_cortex-a53.apk"
          SINGBOX_URL="https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/${SINGBOX_APK}"

          echo ">>> 下载 sing-box ${SINGBOX_VERSION} (openwrt/aarch64_cortex-a53)..."
          wget -q "${SINGBOX_URL}" -O "${SINGBOX_APK}"

          echo ">>> 从 APK 中提取二进制（APK 本质为 tar+gz）..."
          mkdir -p singbox_extract
          tar -xzf "${SINGBOX_APK}" -C singbox_extract
          # APK 内路径为 usr/bin/sing-box
          ls -lh singbox_extract/usr/bin/sing-box

          echo ">>> 注入到 files overlay → /usr/bin/sing-box"
          mkdir -p files/usr/bin
          cp singbox_extract/usr/bin/sing-box files/usr/bin/sing-box
          chmod +x files/usr/bin/sing-box

          echo ">>> 二进制信息："
          file files/usr/bin/sing-box
          echo ">>> sing-box 注入完成 ✅"

      # ---------------------------------------------------------------
      # mihomo 1.19.22 二进制注入
      # nikki 的 mihomo 核心位于 /usr/bin/mihomo（来自 nikki APK 包）
      # 官方 releases 格式：mihomo-linux-arm64-v{version}.gz（单文件 gzip）
      # 下载后 gunzip 直接得到二进制，覆盖到 files/usr/bin/mihomo
      # ---------------------------------------------------------------
      - name: 🔧 Inject mihomo ${{ env.MIHOMO_VERSION }} binary (linux/arm64 → files overlay)
        run: |
          set -euo pipefail
          MIHOMO_URL="https://github.com/MetaCubeX/mihomo/releases/download/v${MIHOMO_VERSION}/mihomo-linux-arm64-v${MIHOMO_VERSION}.gz"

          echo ">>> 下载 mihomo ${MIHOMO_VERSION} (linux/arm64)..."
          wget -q "${MIHOMO_URL}" -O mihomo.gz
          gunzip -f mihomo.gz  # 解压得到 ./mihomo 二进制

          echo ">>> 注入到 files overlay → /usr/bin/mihomo"
          mkdir -p files/usr/bin
          cp mihomo files/usr/bin/mihomo
          chmod +x files/usr/bin/mihomo

          echo ">>> 二进制信息："
          file files/usr/bin/mihomo
          echo ">>> mihomo 注入完成 ✅"

      - name: 🔍 Verify profile exists
        run: |
          echo ">>> 检查设备 Profile 是否存在..."
          cd imagebuilder
          make info | grep -A3 "${PROFILE}" || {
            echo "❌ Profile '${PROFILE}' 不存在"
            make info
            exit 1
          }
          echo ">>> Profile 确认存在 ✅"

      - name: 🏗️ Build firmware
        run: |
          set -euo pipefail
          cd imagebuilder
          echo ">>> 开始构建固件，Profile: ${PROFILE}"
          echo ">>> 版本: ${OPENWRT_VERSION}"
          echo ">>> 时间: $(date)"
          echo "---"
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES="apk-mbedtls base-files ca-bundle dnsmasq-full dropbear \
              firewall4 fitblk fstools kmod-crypto-hw-safexcel \
              kmod-gpio-button-hotplug kmod-leds-gpio libc libgcc \
              libustream-mbedtls logd mtd netifd nftables odhcp6c \
              odhcpd-ipv6only ppp ppp-mod-pppoe procd-ujail uboot-envtools \
              uci uclient-fetch urandom-seed urngd wpad-basic-mbedtls \
              kmod-mt7915e kmod-mt7981-firmware mt7981-wo-firmware luci \
              openssh-sftp-server zoneinfo-asia curl yq \
              kmod-nft-offload kmod-nft-socket kmod-nft-tproxy kmod-tun \
              kmod-inet-diag ip-full kmod-dummy kmod-tcp-bbr \
              luci-app-attendedsysupgrade luci-i18n-attendedsysupgrade-zh-cn \
              luci-i18n-base-zh-cn luci-i18n-firewall-zh-cn \
              luci-i18n-package-manager-zh-cn \
              nikki luci-app-nikki luci-i18n-nikki-zh-cn \
              sing-box" \
            FILES="../files"
          echo "---"
          echo ">>> 构建完成，时间: $(date)"

      - name: ✅ Verify output
        run: |
          echo ">>> 检查输出文件..."
          cd imagebuilder
          SYSUPGRADE=$(ls bin/targets/mediatek/filogic/*sysupgrade* 2>/dev/null)
          if [ -z "$SYSUPGRADE" ]; then
            echo "❌ 未找到 sysupgrade 固件"
            exit 1
          fi
          echo ">>> 固件文件列表："
          ls -lh bin/targets/mediatek/filogic/
          echo ""
          echo ">>> SHA256 校验值："
          cat bin/targets/mediatek/filogic/sha256sums
          echo ""
          echo "✅ 固件构建成功：$(basename $SYSUPGRADE)"

      - name: 📤 Upload firmware artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: openwrt-360T7-${{ env.OPENWRT_VERSION }}-${{ github.run_number }}
          path: |
            imagebuilder/bin/targets/mediatek/filogic/*sysupgrade*
            imagebuilder/bin/targets/mediatek/filogic/sha256sums
          retention-days: 30
          if-no-files-found: error

      - name: 🏷️ Generate release tag
        id: tag
        run: |
          DATE=$(date -u '+%Y%m%d')
          TAG="v${OPENWRT_VERSION}-${DATE}-r${{ github.run_number }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo ">>> Release tag: ${TAG}"

      - name: 📝 Generate release notes
        id: notes
        run: |
          cd imagebuilder
          SYSUPGRADE=$(ls bin/targets/mediatek/filogic/*sysupgrade* 2>/dev/null | head -1)
          FILENAME=$(basename "${SYSUPGRADE}")
          SHA256=$(grep "${FILENAME}" bin/targets/mediatek/filogic/sha256sums | awk '{print $1}')
          FILESIZE=$(ls -lh "${SYSUPGRADE}" | awk '{print $5}')
          BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC')

          cat > /tmp/release_notes.md << EOF
          ## OpenWrt 固件 - Qihoo 360T7

          | 项目 | 值 |
          |------|-----|
          | OpenWrt 版本 | \`${OPENWRT_VERSION}\` |
          | sing-box 版本 | \`${SINGBOX_VERSION}\` |
          | mihomo 版本 | \`${MIHOMO_VERSION}\` |
          | 构建时间 | ${BUILD_TIME} |
          | 固件大小 | ${FILESIZE} |
          | Commit | \`${{ github.sha }}\` |

          ### 内置组件

          - **nikki** (luci-app-nikki) \`2026.03.10-r3\`，mihomo 内核已升级至 \`v${MIHOMO_VERSION}\`
          - **sing-box** \`${SINGBOX_VERSION}\`（官方 openwrt/aarch64_cortex-a53 专属 APK，完全适配 360T7）
          - **LuCI** 中文界面
          - dnsmasq-full / nftables / kmod-tun / kmod-nft-tproxy 等透明代理依赖

          ### 二进制覆盖说明

          > nikki APK 自带 mihomo \`1.19.21\`，本固件通过 files overlay 将其替换为 \`${MIHOMO_VERSION}\`。
          > sing-box APK（官方仓库 \`1.12.17\`）的 init 脚本保留，二进制通过官方 cortex-a53 专属 APK 替换为 \`${SINGBOX_VERSION}\`。

          ### SHA256 校验

          \`\`\`
          ${SHA256}  ${FILENAME}
          \`\`\`

          ### 刷写说明

          > ⚠️ 首次从其他固件切换请先备份配置

          **保留配置刷入：**
          \`\`\`
          sysupgrade -v /tmp/${FILENAME}
          \`\`\`

          **不保留配置（推荐首次刷入）：**
          \`\`\`
          sysupgrade -n /tmp/${FILENAME}
          \`\`\`
          EOF

          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "OpenWrt ${{ env.OPENWRT_VERSION }} for 360T7 · ${{ steps.tag.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            imagebuilder/bin/targets/mediatek/filogic/*sysupgrade*
            imagebuilder/bin/targets/mediatek/filogic/sha256sums
          fail_on_unmatched_files: true
