a: &a {type: url-test, interval: 300, tolerance: 50, url: 'https://www.gstatic.com/generate_204'} # 定义锚点a：自动测速策略，间隔300秒，容差50ms
j: &j {type: http, interval: 86400, override: { client-fingerprint: chrome }, health-check: { enable: true, url: https://www.gstatic.com/generate_204, interval: 300 } } #代理集模板，每24小时更新，模拟Chrome指纹
s: &s {type: select, proxies: ["at", "us", "hk", "jp", "tw", "sg", "rm", "kr", "DIRECT"]} # 定义锚点s：手动选择策略组模板，包含常用地区组
r: &r {type: select, proxies: ["rm", "us", "jp", "at", "hk", "tw", "sg", "kr"]} # 定义锚点r：ai专用策略组模板，包含日美地区组
p: &p [exx, fjj, bxx, ouu, ovv, xxg] # 定义锚点p：引用的代理提供者列表
d: &d {type: http, format: mrs, interval: 86400, behavior: domain} # 定义锚点d：域名规则集模板，mrs格式，24小时更新
i: &i {type: http, format: mrs, interval: 86400, behavior: ipcidr} # 定义锚点i：IP规则集模板，mrs格式，24小时更新

proxy-providers: # 定义外部代理订阅来源
  #iix: { <<: *j, url: "https://iix.xx.kg:296/a?format=clash", path: ./iix.yaml }   # 引用锚点j配置，订阅iix源 美国洛杉矶cc
  bxx: { <<: *j, url: "https://bxx.xx.kg:296/a?format=clash", path: ./bxx.yaml }   # 引用锚点j配置，订阅bxx源 美国俄勒冈
  ouu: { <<: *j, url: "https://ouu.xx.kg:296/a?format=clash", path: ./ouu.yaml }   # 引用锚点j配置，订阅ouu源 美国洛杉矶cc
  rrx: { <<: *j, url: "https://rrx.xx.kg:296/a?format=clash", path: ./rrx.yaml }   # 引用锚点j配置，订阅rrx源 韩国
  #ifj: { <<: *j, url: "https://ifj.xx.kg:296/a?format=clash", path: ./ifj.yaml }   # 引用锚点j配置，订阅ifj源 日本大版
  fjj: { <<: *j, url: "https://fjj.xx.kg:296/a?format=clash", path: ./fjj.yaml }   # 引用锚点j配置，订阅fjj源 日本东京
  xxg: { <<: *j, url: "https://xxg.xx.kg:296/a?format=clash", path: ./xxg.yaml }   # 引用锚点j配置，订阅ovv源 新加坡
  ovv: { <<: *j, url: "https://ovv.xx.kg:296/a?format=clash", path: ./ovv.yaml }   # 引用锚点j配置，订阅ovv源 台湾
  exx: { <<: *j, url: "https://exx.xx.kg:296/a?format=clash", path: ./exx.yaml }   # 引用锚点j配置，订阅exx源 香港
port: 8080 # HTTP代理监听端口
socks-port: 1080 # SOCKS5代理监听端口
mixed-port: 7890 # 混合代理端口(HTTP+SOCKS)
redir-port: 7891 # 透明代理重定向端口
tproxy-port: 7892 # 透明代理TProxy端口
allow-lan: true # 允许局域网设备连接
bind-address: "*" # 绑定所有网络接口
mode: rule # 运行模式：规则模式
log-level: warning # 日志级别：仅记录警告及以上
ipv6: true # IPv6支持 true开 false关
external-controller: 0.0.0.0:9090 # 外部控制API端口
external-ui: "ui" # 外部Web面板路径
secret: "14285700" # 外部控制API的访问密码
unified-delay: true # 统一延迟计算（去除握手时间）
tcp-concurrent: true # 开启TCP并发连接
find-process-mode: off # 关闭进程匹配模式（路由器一般用不到）
keep-alive-interval: 1800 # TCP长连接保活间隔
profile: { store-selected: true, store-fake-ip: true } # 持久化存储：记录选择的节点和Fake-IP映射
sniffer: # 流量嗅探设置
  enable: true # 开启嗅探
  parse-pure-ip: true # 开启纯IP嗅探
  sniff: {HTTP: {ports: [80, 8080-8880], override-destination: false}, TLS: {ports: [443, 8443]}, QUIC: {ports: [443, 8443]}} # 嗅探协议和端口范围
  skip-domain: ["Mijia Cloud", "+.push.apple.com", "+.apple.com", "+.baidu.com", "+.qq.com", "+.gtimg.com"] # 跳过嗅探的域名列表（防止米家等设备断连）
tun: {enable: true, stack: mixed, device: utun, auto-route: true, auto-detect-interface: true, dns-hijack: [any:53], mtu: 1500, gso: true, gro: true, strict-route: true, endpoint-independent-nat: true, udp-timeout: 300} # TUN模式详细设置：混合栈、自动路由、DNS劫持等
dns: # DNS设置
  enable: true # 开启DNS服务
  listen: 0.0.0.0:1053 # DNS监听端口
  ipv6: true # 关闭IPv6 DNS解析
  cache-algorithm: arc # 使用 ARC 缓存算法
  use-hosts: true # 允许读取系统 hosts
  use-system-hosts: true
  enhanced-mode: fake-ip # 增强模式：Fake-IP
  fake-ip-range: 198.18.0.1/16 # Fake-IP地址池范围
  fake-ip-filter: ["*.lan", "*.local", "*.home", "*.arpa", "+.localdomain", "10.0.0.1", "+.miui.com", "+.xiaomi.com", "+.music.163.com","+.msftconnecttest.com","+.msftncsi.com","+.localhost.ptlogin2.qq.com"] # 不使用Fake-IP的域名列表（直连或局域网域名）
  prefer-h3: true # 优先使用HTTP/3进行DoH查询
  default-nameserver: [223.5.5.5, 119.29.29.29] # 引导DNS（用于解析DoH域名），使用阿里和腾讯DNS
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29] # 代理服务器域名的解析DNS
  nameserver: [https://dns.google/dns-query, https://cloudflare-dns.com/dns-query] # 主要DNS服务器（DoH），用于解析国外域名
  nameserver-policy:
    "+.lan,+.local,+.home,+.arpa,rule-set:private": "10.0.0.1"
    "+.miui.com,+.xiaomi.com,+.music.163.com,+.msftconnecttest.com,+.msftncsi.com,+.localhost.ptlogin2.qq.com": [223.5.5.5, 119.29.29.29]
    "rule-set:cn": [223.5.5.5, 119.29.29.29, 223.6.6.6]
