proxy-groups: # 策略组定义
  - {name: "hk", <<: *a, filter: "(?i)港|hk|hongkong|hong kong", use: *p} # 策略组hk：自动选择香港节点
  - {name: "tw", <<: *a, filter: "(?i)台|tw|taiwan", use: *p} # 策略组tw：自动选择台湾节点
  - {name: "sg", <<: *a, filter: "(?i)新|sg|singapore", use: *p} # 策略组sg：自动选择新加坡节点
  - {name: "jp", <<: *a, filter: "(?i)日|jp|japan", use: *p} # 策略组jp：自动选择日本节点
  - {name: "kr", <<: *a, filter: "(?i)韩|kr|korea", use: *p} # 策略组kr：自动选择韩国节点
  - {name: "us", <<: *a, filter: "(?i)美|us|unitedstates|united states", use: *p} # 策略组us：自动选择美国节点
  - {name: "rm", <<: *a, filter: "(?i)美|us|unitedstates|united states", use: [bxx], dialer-proxy: "hk"} # 策略组rm：美国节点链式代理，强制走hk组转发
  - {name: "at", <<: *a, use: *p} # 策略组at：自动选择(url-test)，使用p中的所有代理
  - {name: "mt", <<: *s}
  - {name: "openai", <<: *r} # 策略组openai：日美地区
