rules:
  # ── 特殊处理 ──
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT          # 拦截所有 UDP 443（QUIC），中国移动封锁该协议
  - AND,((DOMAIN-SUFFIX,bxx.xx.kg),(DST-PORT,443)),dd  # bxx 节点走兜底组（bxx 本身不支持 443/QUIC，交由 dd 组选择出口）
  - DOMAIN-SUFFIX,xx.kg,DIRECT                         # 自有节点域名直连（订阅拉取走直连）
  - DST-PORT,3478-3479,REJECT                          # STUN/TURN 标准端口
  - DST-PORT,5349-5350,REJECT                          # STUN/TURN TLS 端口
  - DST-PORT,19302-19309,REJECT                        # Google STUN 端口
  #- DOMAIN-KEYWORD,stun,REJECT                         # STUN 域名关键字
  # ── 广告拦截 ──
  - RULE-SET,JohnsonRan,REJECT
  - RULE-SET,QRuWGQ,REJECT
  - RULE-SET,Quixotic,REJECT
  #- RULE-SET,adrules,REJECT
  #- RULE-SET,Xndeye,REJECT
  #- RULE-SET,DustinWin,REJECT
  #- RULE-SET,awavenue,REJECT
  #- RULE-SET,ads-all,REJECT
  # ── 局域网直连 ──
  - RULE-SET,private,DIRECT
  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,ntp,DIRECT
  # ── P2P 直连 ──
  - DST-PORT,6881-6889,DIRECT                          # BitTorrent 常用端口
  - DST-PORT,51413,DIRECT                              # qBittorrent 默认端口
  # ── AI 服务 ──
