# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ 路由规则 ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
rules:
  # ── 特殊处理 ──
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT          # 拦截所有 UDP 443（QUIC），中国移动封锁该协议
  - PROCESS-NAME,aria2c,DIRECT                         # aria2 下载器直连
  - PROCESS-NAME,BitComet,DIRECT                       # BitComet 直连
  - PROCESS-NAME,qBittorrent,DIRECT                    # qBittorrent 直连
  - AND,((DOMAIN-SUFFIX,bxx.xx.kg),(DST-PORT,443)),dd  # bxx 节点走兜底组（bxx 本身不支持 443/QUIC，交由 dd 组选择出口）
  - DOMAIN-SUFFIX,xx.kg,DIRECT                         # 自有节点域名直连（订阅拉取走直连）
  # ── WebRTC / STUN / TURN 封锁 ──
  - DST-PORT,3478-3479,REJECT    # STUN/TURN 标准端口
  - DST-PORT,5349-5350,REJECT    # STUN/TURN TLS 端口
  - DST-PORT,19302-19309,REJECT  # Google STUN 端口
  - DOMAIN-KEYWORD,stun.,REJECT  # STUN 域名关键字
  # ── 广告拦截 ──
  - RULE-SET,JohnsonRan,REJECT
  - RULE-SET,QRuWGQ,REJECT
  - RULE-SET,Quixotic,REJECT
  #- RULE-SET,adrules,REJECT
  #- RULE-SET,Xndeye,REJECT
  #- RULE-SET,DustinWin,REJECT
  #- RULE-SET,awavenue,REJECT
  #- RULE-SET,ads-all,REJECT
  # ── AI 服务 ──
  - RULE-SET,openai,openai
  - RULE-SET,anthropic,anthropic
  - RULE-SET,gemini,gemini
  - RULE-SET,ai-general,ai-general
  # ── 社交媒体 ──
  - RULE-SET,telegram,telegram
  - RULE-SET,telegram_ip,telegram,no-resolve  # IP 规则无需 DNS 解析
  - RULE-SET,twitter,twitter
  - RULE-SET,facebook,facebook
  - RULE-SET,instagram,instagram
  - RULE-SET,whatsapp,whatsapp
  - RULE-SET,discord,discord
  - RULE-SET,reddit,reddit
  - RULE-SET,pinterest,pinterest
  - RULE-SET,tiktok,tiktok
  # ── 流媒体视频 ──
  - RULE-SET,youtube,youtube
  - RULE-SET,netflix,netflix
  - RULE-SET,disney,disney
  - RULE-SET,hbo,hbo
  - RULE-SET,hulu,hulu
  - RULE-SET,primevideo,primevideo
  - RULE-SET,twitch,twitch
  - RULE-SET,biliintl,biliintl
  - RULE-SET,abema,abema
  - RULE-SET,spotify,spotify
  - RULE-SET,pixiv,pixiv
  # ── 游戏平台 ──
  - RULE-SET,steam,steam
  - RULE-SET,epic,epic
  - RULE-SET,xbox,xbox
  - RULE-SET,nintendo,nintendo
  - RULE-SET,blizzard,blizzard
  - RULE-SET,ea,ea
  - RULE-SET,roblox,roblox
  - RULE-SET,games-cn,DIRECT      # 国区游戏直连
  # ── 开发工具 ──
  - RULE-SET,dev,dev
  - RULE-SET,speedtest,speedtest
  - RULE-SET,dropbox,dropbox
  - RULE-SET,onedrive,onedrive
  # ── 互联网大厂 ──
  - RULE-SET,google,google
  - RULE-SET,google_ip,google,no-resolve
  - RULE-SET,microsoft,microsoft
  - RULE-SET,apple,apple
  - RULE-SET,cloudflare,cloudflare
  - RULE-SET,aws,aws
  # ── 支付/金融/加密货币 ──
  - RULE-SET,paypal,paypal
  - RULE-SET,binance,binance
  - RULE-SET,bybit,bybit
  # ── 中国直连 ──
  - RULE-SET,cn,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve
  - RULE-SET,private,DIRECT,no-resolve
  - RULE-SET,private_ip,DIRECT,no-resolve
  # ── 兜底 ──
  - MATCH,dd  # 所有未匹配规则的流量交由 dd 组处理
