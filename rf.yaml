a: &a {type: url-test, interval: 300, tolerance: 50, url: 'https://www.gstatic.com/generate_204'}
j: &j {type: http, interval: 86400, override: { client-fingerprint: chrome }, health-check: { enable: true, url: https://www.gstatic.com/generate_204, interval: 300 } }
s: &s {type: select, proxies: ["at", "us", "hk", "jp", "tw", "sg", "rm", "kr", "DIRECT"]}
r: &r {type: select, proxies: ["rm", "us", "jp", "at", "hk", "tw", "sg", "kr"]}
p: &p [exx, fjj, bxx, ouu, ovv, xxg]
d: &d {type: http, format: mrs, interval: 86400, behavior: domain}
i: &i {type: http, format: mrs, interval: 86400, behavior: ipcidr}

proxy-providers:
  bxx: { <<: *j, url: "https://bxx.xx.kg:296/a?format=clash", path: ./bxx.yaml }
  ouu: { <<: *j, url: "https://ouu.xx.kg:296/a?format=clash", path: ./ouu.yaml }
  fjj: { <<: *j, url: "https://fjj.xx.kg:296/a?format=clash", path: ./fjj.yaml }
  xxg: { <<: *j, url: "https://xxg.xx.kg:296/a?format=clash", path: ./xxg.yaml }
  ovv: { <<: *j, url: "https://ovv.xx.kg:296/a?format=clash", path: ./ovv.yaml }
  exx: { <<: *j, url: "https://exx.xx.kg:296/a?format=clash", path: ./exx.yaml }

port: 8080
socks-port: 1080
mixed-port: 7890
redir-port: 7891
tproxy-port: 7892
allow-lan: true
bind-address: "*"
mode: rule
log-level: warning
ipv6: true
external-controller: 0.0.0.0:9090
external-ui: "ui"
secret: "14285700"
unified-delay: true
tcp-concurrent: true
find-process-mode: off
keep-alive-interval: 1800
profile: { store-selected: true, store-fake-ip: true }

sniffer:
  enable: true
  parse-pure-ip: true
  sniff: {HTTP: {ports: [80, 8080-8880], override-destination: false}, TLS: {ports: [443, 8443]}, QUIC: {ports: [443, 8443]}}
  skip-domain: ["Mijia Cloud", "+.push.apple.com", "+.apple.com", "+.baidu.com", "+.qq.com", "+.gtimg.com"]

tun: {enable: true, stack: mixed, device: utun, auto-route: true, auto-detect-interface: true, dns-hijack: [any:53], mtu: 1500, gso: true, gro: true, strict-route: true, endpoint-independent-nat: true, udp-timeout: 300}

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  cache-algorithm: arc
  use-hosts: true
  use-system-hosts: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter: ["*.lan", "*.local", "*.home", "*.arpa", "+.localdomain", "10.0.0.1", "+.miui.com", "+.xiaomi.com", "+.music.163.com","+.msftconnecttest.com","+.msftncsi.com","+.localhost.ptlogin2.qq.com"]
  prefer-h3: true
  default-nameserver: [223.5.5.5, 119.29.29.29]
  proxy-server-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver: [https://dns.google/dns-query, https://cloudflare-dns.com/dns-query]
  nameserver-policy:
    "+.lan,+.local,+.home,+.arpa,rule-set:private": "10.0.0.1"
    "+.miui.com,+.xiaomi.com,+.music.163.com,+.msftconnecttest.com,+.msftncsi.com,+.localhost.ptlogin2.qq.com": [223.5.5.5, 119.29.29.29]
    "rule-set:cn": [223.5.5.5, 119.29.29.29, 223.6.6.6]

